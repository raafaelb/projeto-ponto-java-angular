<section class="dashboard">
  <header class="dashboard-header">
    <h2>Visao Geral</h2>
    <p>Resumo rapido de cadastros e acessos ativos.</p>
  </header>

  <div *ngIf="isLoading" class="loading-wrap">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!isLoading" class="stats-grid">
    <mat-card class="stat-card">
      <mat-icon>apartment</mat-icon>
      <h3>{{ companyCount }}</h3>
      <p>Empresas</p>
    </mat-card>

    <mat-card class="stat-card">
      <mat-icon>badge</mat-icon>
      <h3>{{ employeeCount }}</h3>
      <p>Funcionarios</p>
    </mat-card>

    <mat-card class="stat-card">
      <mat-icon>manage_accounts</mat-icon>
      <h3>{{ userCount }}</h3>
      <p>Usuarios</p>
    </mat-card>
  </div>
</section>
