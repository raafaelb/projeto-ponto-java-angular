<mat-card class="panel">
  <h2>Minha Performance</h2>
  <table mat-table [dataSource]="goals">
    <ng-container matColumnDef="title"><th mat-header-cell *matHeaderCellDef>Meta</th><td mat-cell *matCellDef="let g">{{ g.title }}</td></ng-container>
    <ng-container matColumnDef="weight"><th mat-header-cell *matHeaderCellDef>Peso</th><td mat-cell *matCellDef="let g">{{ g.weight }}%</td></ng-container>
    <ng-container matColumnDef="dueDate"><th mat-header-cell *matHeaderCellDef>Prazo</th><td mat-cell *matCellDef="let g">{{ g.dueDate || '-' }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let g">{{ g.status }}</td></ng-container>
    <tr mat-header-row *matHeaderRowDef="goalColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: goalColumns"></tr>
  </table>
</mat-card>

<mat-card class="panel">
  <h3>Minhas Avaliacoes</h3>
  <div class="self-form">
    <mat-form-field appearance="outline">
      <mat-label>Nota de autoavaliacao</mat-label>
      <input matInput type="number" [formControl]="selfReviewForm.controls.selfScore" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Comentario</mat-label>
      <input matInput [formControl]="selfReviewForm.controls.selfComment" />
    </mat-form-field>
  </div>
  <table mat-table [dataSource]="reviews">
    <ng-container matColumnDef="period"><th mat-header-cell *matHeaderCellDef>Periodo</th><td mat-cell *matCellDef="let r">{{ r.periodStart }} ate {{ r.periodEnd }}</td></ng-container>
    <ng-container matColumnDef="selfScore"><th mat-header-cell *matHeaderCellDef>Auto</th><td mat-cell *matCellDef="let r">{{ r.selfScore || '-' }}</td></ng-container>
    <ng-container matColumnDef="managerScore"><th mat-header-cell *matHeaderCellDef>Gestor</th><td mat-cell *matCellDef="let r">{{ r.managerScore || '-' }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r">{{ r.status }}</td></ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acoes</th>
      <td mat-cell *matCellDef="let r">
        <button mat-stroked-button color="primary" [disabled]="r.status === 'CLOSED'" (click)="submitSelfReview(r)">Enviar autoavaliacao</button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="reviewColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: reviewColumns"></tr>
  </table>
</mat-card>
