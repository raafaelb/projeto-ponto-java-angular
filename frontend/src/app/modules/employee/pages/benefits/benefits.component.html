<mat-card class="panel">
  <h2>Beneficios Disponiveis</h2>
  <table mat-table [dataSource]="plans">
    <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Plano</th><td mat-cell *matCellDef="let p">{{ p.name }}</td></ng-container>
    <ng-container matColumnDef="employerCost"><th mat-header-cell *matHeaderCellDef>Empresa</th><td mat-cell *matCellDef="let p">{{ p.monthlyEmployerCost }}</td></ng-container>
    <ng-container matColumnDef="employeeCost"><th mat-header-cell *matHeaderCellDef>Funcionario</th><td mat-cell *matCellDef="let p">{{ p.monthlyEmployeeCost }}</td></ng-container>
    <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Acoes</th><td mat-cell *matCellDef="let p"><button mat-stroked-button color="primary" (click)="request(p)">Solicitar adesao</button></td></ng-container>
    <tr mat-header-row *matHeaderRowDef="planColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: planColumns"></tr>
  </table>
</mat-card>

<mat-card class="panel">
  <h3>Minhas adesoes</h3>
  <table mat-table [dataSource]="enrollments">
    <ng-container matColumnDef="plan"><th mat-header-cell *matHeaderCellDef>Plano</th><td mat-cell *matCellDef="let e">{{ e.benefitPlanName }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let e">{{ e.status }}</td></ng-container>
    <ng-container matColumnDef="startDate"><th mat-header-cell *matHeaderCellDef>Inicio</th><td mat-cell *matCellDef="let e">{{ e.startDate || '-' }}</td></ng-container>
    <ng-container matColumnDef="endDate"><th mat-header-cell *matHeaderCellDef>Fim</th><td mat-cell *matCellDef="let e">{{ e.endDate || '-' }}</td></ng-container>
    <ng-container matColumnDef="reviewComment"><th mat-header-cell *matHeaderCellDef>Comentario</th><td mat-cell *matCellDef="let e">{{ e.reviewComment || '-' }}</td></ng-container>
    <tr mat-header-row *matHeaderRowDef="enrollmentColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: enrollmentColumns"></tr>
  </table>
</mat-card>
