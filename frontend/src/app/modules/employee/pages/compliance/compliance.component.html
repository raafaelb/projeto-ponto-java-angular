<mat-card class="panel">
  <h2>Politicas da Empresa</h2>
  <table mat-table [dataSource]="policies">
    <ng-container matColumnDef="title"><th mat-header-cell *matHeaderCellDef>Politica</th><td mat-cell *matCellDef="let p">{{ p.title }}</td></ng-container>
    <ng-container matColumnDef="version"><th mat-header-cell *matHeaderCellDef>Versao</th><td mat-cell *matCellDef="let p">{{ p.version }}</td></ng-container>
    <ng-container matColumnDef="effectiveDate"><th mat-header-cell *matHeaderCellDef>Vigencia</th><td mat-cell *matCellDef="let p">{{ p.effectiveDate }}</td></ng-container>
    <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Acoes</th><td mat-cell *matCellDef="let p"><button mat-stroked-button color="primary" (click)="acknowledge(p)">Reconhecer</button></td></ng-container>
    <tr mat-header-row *matHeaderRowDef="policyColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: policyColumns"></tr>
  </table>
</mat-card>

<mat-card class="panel">
  <h3>Meus reconhecimentos</h3>
  <table mat-table [dataSource]="acknowledgments">
    <ng-container matColumnDef="policy"><th mat-header-cell *matHeaderCellDef>Politica</th><td mat-cell *matCellDef="let a">{{ a.policyTitle }} v{{ a.policyVersion }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let a">{{ a.status }}</td></ng-container>
    <ng-container matColumnDef="acknowledgedAt"><th mat-header-cell *matHeaderCellDef>Data</th><td mat-cell *matCellDef="let a">{{ a.acknowledgedAt || '-' }}</td></ng-container>
    <tr mat-header-row *matHeaderRowDef="ackColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: ackColumns"></tr>
  </table>
</mat-card>
