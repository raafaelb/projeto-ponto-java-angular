<mat-card class="panel">
  <h2>Solicitacoes de Hora Extra</h2>
  <table mat-table [dataSource]="requests">
    <ng-container matColumnDef="employee">
      <th mat-header-cell *matHeaderCellDef>Funcionario</th>
      <td mat-cell *matCellDef="let r">{{ r.employeeName }}</td>
    </ng-container>
    <ng-container matColumnDef="workDate">
      <th mat-header-cell *matHeaderCellDef>Data</th>
      <td mat-cell *matCellDef="let r">{{ r.workDate | date:'dd/MM/yyyy' }}</td>
    </ng-container>
    <ng-container matColumnDef="minutes">
      <th mat-header-cell *matHeaderCellDef>Minutos</th>
      <td mat-cell *matCellDef="let r">{{ r.requestedMinutes }}</td>
    </ng-container>
    <ng-container matColumnDef="reason">
      <th mat-header-cell *matHeaderCellDef>Motivo</th>
      <td mat-cell *matCellDef="let r">{{ r.reason || '-' }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let r">{{ r.status }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acoes</th>
      <td mat-cell *matCellDef="let r">
        <button mat-button color="primary" (click)="approve(r)" [disabled]="r.status !== 'PENDING'">Aprovar</button>
        <button mat-button color="warn" (click)="reject(r)" [disabled]="r.status !== 'PENDING'">Rejeitar</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-card>
