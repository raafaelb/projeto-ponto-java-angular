<section class="manager-page">
  <mat-card class="form-card">
    <h2>{{ editingId ? 'Editar feriado' : 'Novo feriado' }}</h2>
    <form [formGroup]="form" (ngSubmit)="save()" class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Data</mat-label>
        <input matInput type="date" formControlName="holidayDate" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <mat-slide-toggle formControlName="optionalHoliday">Facultativo</mat-slide-toggle>
      <div class="actions">
        <button mat-button type="button" (click)="reset()">Limpar</button>
        <button mat-raised-button color="primary" type="submit">Salvar</button>
      </div>
    </form>
  </mat-card>

  <mat-card class="table-card">
    <h2>Calendario de Feriados</h2>
    <table mat-table [dataSource]="holidays">
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Data</th>
        <td mat-cell *matCellDef="let h">{{ h.holidayDate | date:'dd/MM/yyyy' }}</td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let h">{{ h.name }}</td>
      </ng-container>
      <ng-container matColumnDef="optional">
        <th mat-header-cell *matHeaderCellDef>Facultativo</th>
        <td mat-cell *matCellDef="let h">{{ h.optionalHoliday ? 'Sim' : 'Nao' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acoes</th>
        <td mat-cell *matCellDef="let h">
          <button mat-icon-button color="primary" (click)="edit(h)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="remove(h)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
</section>
