<mat-card class="panel">
  <div class="head">
    <h2>Anomalias de Frequencia</h2>
    <button mat-raised-button color="primary" (click)="generate()">Gerar analise</button>
  </div>

  <table mat-table [dataSource]="anomalies">
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Data</th>
      <td mat-cell *matCellDef="let a">{{ a.occurrenceDate | date:'dd/MM/yyyy' }}</td>
    </ng-container>
    <ng-container matColumnDef="employee">
      <th mat-header-cell *matHeaderCellDef>Funcionario</th>
      <td mat-cell *matCellDef="let a">{{ a.employeeName }}</td>
    </ng-container>
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Tipo</th>
      <td mat-cell *matCellDef="let a">{{ a.type }}</td>
    </ng-container>
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Descricao</th>
      <td mat-cell *matCellDef="let a">{{ a.description }}</td>
    </ng-container>
    <ng-container matColumnDef="resolved">
      <th mat-header-cell *matHeaderCellDef>Resolvido</th>
      <td mat-cell *matCellDef="let a">{{ a.resolved ? 'Sim' : 'Nao' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acoes</th>
      <td mat-cell *matCellDef="let a">
        <button mat-button color="primary" (click)="resolve(a)" [disabled]="a.resolved">Resolver</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-card>
