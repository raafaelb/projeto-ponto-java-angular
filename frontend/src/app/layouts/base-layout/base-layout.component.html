<div class="shell">
  <mat-sidenav-container class="shell-container">
    <mat-sidenav [mode]="'side'" [opened]="isSidebarOpen" class="sidebar">
      <div class="brand">
        <h1>{{ pageTitle }}</h1>
        <p>Gestao de pessoas e acessos</p>
      </div>

      <mat-nav-list>
        <a mat-list-item *ngFor="let item of menuItems" [routerLink]="item.route" routerLinkActive="active-link">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <mat-toolbar class="topbar">
        <button mat-icon-button (click)="toggleSidebar()">
          <mat-icon>menu</mat-icon>
        </button>

        <span class="spacer"></span>

        <button mat-button [matMenuTriggerFor]="userMenu" class="user-button">
          <mat-icon>account_circle</mat-icon>
          <span>{{ userInfo.name }}</span>
        </button>

        <mat-menu #userMenu="matMenu">
          <button mat-menu-item disabled>{{ userInfo.email }}</button>
          <button mat-menu-item (click)="onLogout()">
            <mat-icon>logout</mat-icon>
            Sair
          </button>
        </mat-menu>
      </mat-toolbar>

      <section class="content">
        <router-outlet></router-outlet>
      </section>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
